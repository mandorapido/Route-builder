<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0f14;color:#e8e2d4;font-family:'Courier New',monospace;direction:rtl;min-height:100vh;padding:20px 14px 80px}
.bg{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,160,0,.04)1px,transparent 1px),linear-gradient(90deg,rgba(255,160,0,.04)1px,transparent 1px);background-size:40px 40px}

.list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}

.card-top{display:flex;align-items:flex-start;gap:8px}
.num{min-width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.num.d{background:#ffa000;color:#0d0f14}
.num.p{background:#27ae60;color:#0d0f14}

.card-info{flex:1;min-width:0}
.card-addr{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:3px}

.acts{display:flex;gap:4px;flex-shrink:0}
.act{background:transparent;width:26px;height:26px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px;display:flex;align-items:center;justify-content:center}
.export-row{display:flex;gap:8px;margin-top:4px}
.gpx-btn{flex:2;padding:13px 0;background:#ffa000;color:#0d0f14;border:none;border-radius:6px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;text-transform:uppercase}
.gpx-btn:disabled{background:#333;color:#555;cursor:not-allowed}
.vcf-btn{flex:1;padding:13px 0;background:transparent;color:#27ae60;border:1px solid #27ae60;border-radius:6px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer}
.vcf-btn:disabled{border-color:#333;color:#555;cursor:not-allowed}
.hint{font-size:10px;color:#555;text-align:center;margin-top:6px}
.cache-panel{margin-top:12px;background:rgba(39,174,96,.04);border:1px solid #27ae6033;border-radius:8px;padding:12px}
.cache-title{font-size:11px;color:#27ae60;margin-bottom:6px;font-weight:700}
.cache-list{max-height:120px;overflow-y:auto}
.cache-item{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#aaa;padding:3px 0;border-bottom:1px solid #1e2228}
.cache-del{background:transparent;border:none;color:#c0392b;cursor:pointer;font-size:12px}
.free-tag{font-size:9px;padding:2px 7px;background:rgba(39,174,96,.15);border:1px solid #27ae6055;border-radius:10px;color:#27ae60;margin-right:4px}
</style>

<body>
<div class="bg"></div>
<div class="wrap">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
    <span style="font-size:22px;color:#ffa000">&#9672;</span>
    <h1>Route Builder</h1>

      &#128241; &#1505;&#1504;&#1499;&#1512;&#1503; &#1488;&#1504;&#1513;&#1497; &#1511;&#1513;&#1512; &#1502;&#1492;&#1496;&#1500;&#1508;&#1493;&#1503;
    </button>

      <div style="font-size:11px;color:#555">&#1500;&#1495;&#1509; &#1500;&#1489;&#1495;&#1493;&#1512; &#183; &#1495;&#1497;&#1504;&#1502;&#1497; &#183; &#1491;&#1497;&#1493;&#1511; 100%</div>

      <div class="row">
        <input type="password" id="apikey" placeholder="sk-ant-api03-...">

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let mode='pdf',pdfText='',imgB64=null,imgMime=null,stops=[];
let existingPhones=new Set();

// Cache
const CK='rb_v6';
function loadCache(){try{return JSON.parse(localStorage.getItem(CK)||'{}')}catch{return{}}}
function saveCache(c){try{localStorage.setItem(CK,JSON.stringify(c))}catch{}}
function normKey(a){return String(a).trim().replace(/\s+/g,' ').toLowerCase()}
function cacheGet(a){return loadCache()[normKey(a)]||null}
function cacheSet(a,lat,lon){const c=loadCache();c[normKey(a)]={lat,lon};saveCache(c)}
function cacheDel(a){const c=loadCache();delete c[normKey(a)];saveCache(c)}

// Quoted-Printable decoder
function decodeQP(str){
  // Join soft line breaks first (= at end of line means continuation)
  const joined=str.replace(/=\r?\n/g,'');
  try{return decodeURIComponent(joined.replace(/=([0-9A-Fa-f]{2})/g,'%$1'));}
  catch{return joined.replace(/=([0-9A-Fa-f]{2})/g,(_,h)=>String.fromCharCode(parseInt(h,16)));}
}
function joinQPLines(card){
  return card.replace(/=\r?\n[ \t]?/g,'');
}
function decodeVCFField(line){
  const ci=line.indexOf(':');if(ci===-1)return line;
  const pfx=line.slice(0,ci).toUpperCase();
  let val=line.slice(ci+1);
  if(pfx.includes('QUOTED-PRINTABLE'))val=decodeQP(val);
  return val.trim();
}
function normalizePhone(p){
  if(!p)return null;
  let d=String(p).replace(/\D/g,'');
  if(d.startsWith('972'))d='0'+d.slice(3);
  if(d.length>=9&&d.length<=10)return d;
  return null;
}
function isNewContact(phone){
  if(!phone||existingPhones.size===0)return true;
  const n=normalizePhone(phone);
  return n&&!existingPhones.has(n);
}

// Address extraction from text
function extractAddrFromText(text){
  if(!text)return '';
  const clean=text.replace(/[\u{1F300}-\u{1FFFF}]/gu,' ').replace(/[-|/\\]/g,' ').replace(/\s+/g,' ').trim();
  const p1=clean.match(/([\u0590-\u05FF][\u0590-\u05FF' -]{1,20})\s+(\d{1,4})\s+([\u0590-\u05FF][\u0590-\u05FF ]{1,15})/);
  if(p1)return (p1[1]+' '+p1[2]+' '+p1[3]).trim();
  const p3=clean.match(/([\u0590-\u05FF][\u0590-\u05FF' -]{2,20})\s+(\d{1,4})/);
  if(p3)return (p3[1]+' '+p3[2]).trim();
  return '';
}
function getAddressFromContacts(phone,cityHint){
  if(!phone||!window.existingContacts)return '';
  const n=normalizePhone(phone);if(!n)return '';
  const c=window.existingContacts[n];if(!c)return '';
  const fields=[c.address||'',c.note||'',c.name||''];
  for(const field of fields){
    if(!field||field.length<3)continue;
    if(/[\u0590-\u05FF]/.test(field)&&/\d/.test(field)){
      const addr=extractAddrFromText(field);
      if(addr.length>4){
        // Always append city hint if it's not already included
        const finalA = (cityHint&&cityHint.length>1&&!addr.includes(cityHint))
          ? addr+' '+cityHint : addr;
        return finalA;
      }
    }
  }
  return '';
}

// Init
window.addEventListener('DOMContentLoaded',()=>{
  // Version 4: only clear if major version change
  if(localStorage.getItem('contacts_v')==='1'||localStorage.getItem('contacts_v')==='2'){
    localStorage.removeItem('existing_phones');
    localStorage.removeItem('existing_contacts');
  }
  const k=localStorage.getItem('ant_v6');if(k)document.getElementById('apikey').value=k;
  document.getElementById('apikey').addEventListener('change',()=>localStorage.setItem('ant_v6',document.getElementById('apikey').value.trim()));
  // Load saved contacts
  try{
    const saved=localStorage.getItem('existing_phones');
    if(saved){
      existingPhones=new Set(JSON.parse(saved));
      const savedC=localStorage.getItem('existing_contacts');
      if(savedC)window.existingContacts=JSON.parse(savedC);
      // Show last sync date
      const _sd=localStorage.getItem('contacts_date');
      const _de=document.getElementById('contacts-date');
      if(_sd&&_de){
        const _days=Math.floor((Date.now()-parseInt(_sd))/(1000*60*60*24));
        if(_days===0)_de.textContent=' · סונכרן היום';
        else if(_days===1)_de.textContent=' · סונכרן אתמול';
        else if(_days<=7)_de.textContent=' · לפני '+_days+' ימים';
        else{_de.textContent=' · לפני '+_days+' ימים ⚠ מומלץ לעדכן';_de.style.color='#e67e22';}
      }
      const btn=document.getElementById('vcf-load-btn');
      btn.textContent='\u2713 '+existingPhones.size+' \u05e0\u05d8\u05e2\u05e0\u05d5 \u00b7 \u05dc\u05d7\u05e5 \u05dc\u05e2\u05d3\u05db\u05df';
      btn.style.color='#27ae60';btn.style.borderColor='#27ae60';
      document.getElementById('contacts-count').textContent=existingPhones.size+' \u05e0\u05d8\u05e2\u05e0\u05d5';
    }
  }catch{}
  // File input listeners
  document.getElementById('f-gpx-in').addEventListener('change',function(){
    if(this.files&&this.files[0])importGPX(this.files[0]);
    this.value='';
  });
  document.getElementById('f-vcf-in').addEventListener('change',function(){
    if(this.files&&this.files[0])loadExistingContacts(this.files[0]);
  });
  document.getElementById('f-pdf').addEventListener('change',function(){
    if(this.files&&this.files[0])handlePDF(this.files[0]);
  });
  document.getElementById('f-cam').addEventListener('change',function(){
    if(this.files&&this.files[0])handleImg(this.files[0]);
  });
  document.getElementById('f-gal').addEventListener('change',function(){
    if(this.files&&this.files[0])handleImg(this.files[0]);
  });
  renderCache();
});

function toggleKey(){const el=document.getElementById('apikey');el.type=el.type==='password'?'text':'password';}
function getKey(){return document.getElementById('apikey').value.trim();}

function setMode(m){
  mode=m;
  document.getElementById('tab-pdf').className='tab'+(m==='pdf'?' on':'');
  document.getElementById('tab-img').className='tab'+(m==='img'?' on':'');
  document.getElementById('panel-pdf').style.display=m==='pdf'?'':'none';
  document.getElementById('panel-img').style.display=m==='img'?'':'none';
  clearResults();
}

function syncContacts(){openVCFPicker();}

async function syncContacts(){
  const btn=document.getElementById('vcf-load-btn');
  // Try Contact Picker API (works on HTTPS only)
  if('contacts' in navigator&&navigator.contacts&&navigator.contacts.select){
    try{
      btn.textContent='⏳ בוחר אנשי קשר...';
      btn.style.color='#ffa000';btn.style.borderColor='#ffa000';
      const props=['name','tel','address'];
      const opts={multiple:true};
      const contacts=await navigator.contacts.select(props,opts);
      if(!contacts||!contacts.length){
        btn.textContent='⚠ לא נבחרו';
        btn.style.color='#888';btn.style.borderColor='#444';
        return;
      }
      const phoneMap=Object.assign({},window.existingContacts||{});
      for(const c of contacts){
        const cname=(c.name&&c.name[0])||'';
        let addr='';
        if(c.address&&c.address[0]){
          const a=c.address[0];
          addr=[a.addressLine,a.city].filter(Boolean).join(' ').trim();
        }
        for(const tel of (c.tel||[])){
          const p=normalizePhone(tel);
          if(p)phoneMap[p]={phone:p,name:cname,address:addr,note:''};
        }
      }
      existingPhones=new Set(Object.keys(phoneMap));
      window.existingContacts=phoneMap;
      try{
        localStorage.setItem('existing_phones',JSON.stringify([...existingPhones]));
        const compact={};
        for(const[k,v]of Object.entries(phoneMap)){
          if(v.name||v.address)compact[k]={name:v.name||'',address:v.address||'',note:v.note||''};
        }
        localStorage.setItem('existing_contacts',JSON.stringify(compact));
        localStorage.setItem('contacts_v','4');
        localStorage.setItem('contacts_date',Date.now().toString());
        localStorage.setItem('contacts_date',Date.now().toString());
      }catch(ex){}
      btn.textContent='✓ '+existingPhones.size+' נסנכרנו • לחץ לעדכן';
      btn.style.color='#27ae60';btn.style.borderColor='#27ae60';
      btn.style.background='linear-gradient(135deg,#1a2a1a,#0d1a0d)';
      document.getElementById('contacts-count').textContent=existingPhones.size+' נסנכרנו';
      if(stops.length)renderResults();
      return;
    }catch(e){
      console.log('Contact Picker:',e.message);
    }
  }
  // Fallback to VCF
  openVCFPicker();
}

function openVCFPicker(){document.getElementById('f-vcf-in').click();}

function loadExistingContacts(file){
  if(!file)return;
  const btn=document.getElementById('vcf-load-btn');
  btn.textContent='\u23f3 \u05d8\u05d5\u05e2\u05df...';btn.style.color='#ffa000';btn.style.borderColor='#ffa000';
  const r=new FileReader();
  r.onload=e=>{
    const text=e.target.result;
    const phoneMap={};
    const cards=text.split(/BEGIN:VCARD/i).slice(1);
    let i=0;
    function processChunk(){
      const chunkEnd=Math.min(i+200,cards.length);
      for(;i<chunkEnd;i++){
        const card=cards[i];
        const phones=[...card.matchAll(/TEL[^:]*:([+0-9 \t\r\n\-()+]+)/gi)]
          .map(m=>normalizePhone(m[1])).filter(Boolean);
        if(!phones.length)continue;
        const c2=joinQPLines(card);
        let cname='',addr='',cnote='';
        const fnLine=c2.match(/FN[^\r\n]*/i);if(fnLine)cname=decodeVCFField(fnLine[0]);
        const adrLine=c2.match(/ADR[^\r\n]*/i);
        if(adrLine){const dec=decodeVCFField(adrLine[0]);addr=dec.split(';').map(p=>p.trim()).filter(Boolean).join(' ').trim();}
        const noteLine=c2.match(/NOTE[^\r\n]*/i);if(noteLine)cnote=decodeVCFField(noteLine[0]);
        if(!addr&&cnote&&cnote.length>3)addr=cnote;
        for(const p of phones)phoneMap[p]={phone:p,address:addr||'',name:cname,note:cnote};
      }
      btn.textContent='\u23f3 '+i+'/'+cards.length+'...';
      if(i<cards.length){setTimeout(processChunk,0);}
      else{
        // MERGE with existing contacts (don't replace)
        const merged=Object.assign({},window.existingContacts||{},phoneMap);
        existingPhones=new Set(Object.keys(merged));
        window.existingContacts=merged;
        try{
          localStorage.setItem('existing_phones',JSON.stringify([...existingPhones]));
          const compact={};
          for(const[k,v]of Object.entries(merged)){
            if(v.name||v.address||v.note)compact[k]={name:v.name||'',address:v.address||'',note:v.note||''};
          }
          localStorage.setItem('existing_contacts',JSON.stringify(compact));
          localStorage.setItem('contacts_v','4');
        }catch(ex){
          try{localStorage.setItem('existing_phones',JSON.stringify([...existingPhones]));localStorage.setItem('contacts_v','4');}catch{}
        }
        btn.textContent='\u2713 '+existingPhones.size+' \u05e0\u05d8\u05e2\u05e0\u05d5 \u00b7 \u05dc\u05d7\u05e5 \u05dc\u05e2\u05d3\u05db\u05df';
        btn.style.color='#27ae60';btn.style.borderColor='#27ae60';
        document.getElementById('contacts-count').textContent=existingPhones.size+' \u05e0\u05d8\u05e2\u05e0\u05d5';
        document.getElementById('f-vcf-in').value='';
        if(stops.length)renderResults();
      }
    }
    processChunk();
  };
  r.readAsText(file,'utf-8');
}

function cleanAddr(s){
  // Extract רח:"street" BEFORE cleaning - this is the real street name
  const rachM=s.match(/\u05e8\u05d7:"([^"]+)"/)||s.match(/\u05e8\u05d7:'([^']+)'/);
  const rachStreet=(rachM&&/[\u0590-\u05FF]/.test(rachM[1]))?rachM[1].trim():'';
  let r=s
    .replace(/\u05d8\u05dc[:\s]*\d{7,}\s*$/,'')   // remove טל:XXXXXXX at end
    .replace(/\u05db\u05e0\u05d9\u05e1\u05d4.*/i,'').replace(/\u05d1\u05e0\u05d9\u05d9\u05df.*/i,'')
    .replace(/\u05de\u05d5\u05e9\u05d1|\u05e2\u05d9\u05e8|\u05d9\u05d9\u05e9\u05d5\u05d1/g,' ')
    .replace(/[()[\]*]/g,' ').replace(/\u05e8\u05d7:"[^"]*"/g,' ').replace(/#\d+#/g,' ')
    .replace(/\s+\d{1,2}\s*$/,'').replace(/\s+/g,' ').trim();
  // Remove duplicate suffix
  const w=r.split(' ');
  for(let i=2;i<w.length;i++){
    if(w[i]===w[0]&&w.slice(i).join(' ').startsWith(w.slice(0,i-1).join(' '))){r=w.slice(0,i).join(' ');break;}
  }
  // If רח: found, rebuild: street + number + city
  if(rachStreet){
    const numM=r.match(/\d+/);const num=numM?numM[0]:'';
    const hw=r.match(/[\u0590-\u05FF]+/g)||[];const city=hw[hw.length-1]||'';
    if(num&&city)r=rachStreet+' '+num+' '+city;
    else r=rachStreet+(num?' '+num:'')+(city?' '+city:'');
  }
  return r.trim();
}

function isWeakAddr(a){
  if(!a||a.length<3||!/\d/.test(a))return true;
      if(/\s0(\s|$)/.test(a))return true;
  const cities=['\u05d9\u05d2\u05dc','\u05dc\u05d5\u05d3','\u05e8\u05de\u05dc\u05d4','\u05d7\u05de\u05d3','\u05d6\u05d9\u05ea\u05df','\u05d2\u05d9\u05e0\u05ea\u05d5\u05df','\u05e6\u05e4\u05e8\u05d9\u05d4','\u05d0\u05d7\u05d9\u05e2\u05d6\u05e8','\u05de\u05db\u05d1\u05d9\u05dd','\u05d0\u05d7\u05d9\u05e1\u05de\u05da','\u05d1\u05d9\u05ea \u05d3\u05d2\u05df'];
  const fw=a.trim().split(/\s+/)[0];
  if(cities.includes(fw))return true;
  const ws=a.trim().split(/\s+/);
  return ws.length<=2&&/^\d+$/.test(ws[ws.length-1]);
}

function extractFromPDF(text){
  const addrMap=new Map();
  const lines=text.split('\n');

  // Detect format
  const hasForward=lines.some(l=>l.includes('\u05e4\u05d9\u05d6\u05d5\u05e8'));
  const hasReversed=lines.some(l=>l.includes('\u05e8\u05d5\u05d6\u05d9\u05e4'));

  if(hasReversed&&!hasForward){
    // RTL-reversed mode: package numbers are standalone lines in order
    const pkgList=[];
    for(const line of lines){
      const s=line.trim();
      if(/^\d+$/.test(s)&&parseInt(s)>=1&&parseInt(s)<=20)pkgList.push(parseInt(s));
    }
    let pkgIdx=0;
    for(const line of lines){
      const orig=line.trim();
      if(orig.indexOf('\u05e8\u05d5\u05d6\u05d9\u05e4')===-1&&orig.indexOf('\u05e4\u05d5\u05e1\u05d9\u05d0')===-1)continue;
      const phoneM=orig.match(/05\d{8}/);if(!phoneM)continue;
      const phone=phoneM[0];
      const pkgs=pkgIdx<pkgList.length?pkgList[pkgIdx++]:1;
      let beforePhone=orig.slice(0,orig.indexOf(phone)).trim();
      let addr=beforePhone.split('').reverse().join('').trim();
      addr=addr.replace(/\s*\)\*\(\s*|\s*\(\*\)\s*/g,' ')
        .replace(/\u05d4\u05e2\u05e8\u05d5\u05ea.*/,'').replace(/\u05d8\u05dc[\s:]\d*.*/,'')
        .replace(/[A-Za-z\s]{3,}$/,'').replace(/\s+/g,' ').trim();
      const revLine=orig.split('').reverse().join('');
      let bon='';
      if(/\u05d1\u05d5\u05df/i.test(revLine))bon='\u05d1\u05d5\u05df';
      const notesM=revLine.match(/\u05d4\u05e2\u05e8\u05d5\u05ea\s+\u05de\u05e9\u05dc\u05d5\u05d7[\s:]+([^\n\r(*]{3,40})/i);
      const notesAddr=notesM?notesM[1].trim():'';
      const alIdx=orig.indexOf(':\u05dc\u05d0');
      let name='';
      if(alIdx!==-1&&alIdx>orig.indexOf(phone)){
        name=orig.slice(orig.indexOf(phone)+phone.length,alIdx).trim().split('').reverse().join('').trim().slice(0,40);
      }
      const type=orig.indexOf('\u05e8\u05d5\u05d6\u05d9\u05e4')!==-1?'delivery':'pickup';
      processStop(addrMap,addr,type,pkgs,phone,name,bon,notesAddr);
    }
  } else {
    // Forward mode: split by delivery, extract package count from WITHIN each delivery
    // Join all lines into one text block per page
    const fullText=lines.join('\n');
    // Split by each delivery item
    const items=fullText.split(/(?=(?:\u05e4\u05d9\u05d6\u05d5\u05e8|\u05d0\u05d9\u05e1\u05d5\u05e3)\s+\u05dc\u05e7\s+\d+)/);
    for(const item of items){
      const tm=item.match(/^(\u05e4\u05d9\u05d6\u05d5\u05e8|\u05d0\u05d9\u05e1\u05d5\u05e3)/);
      if(!tm)continue;
      const type=tm[1]==='\u05e4\u05d9\u05d6\u05d5\u05e8'?'delivery':'pickup';

      // Package count: digit BEFORE or AFTER (*) marker
      let pkgs=1;
      // Try after (*) first
      const pkgAfter=item.match(/[)(][*][)(]\s*\n?\s*(\d+)/);
      if(pkgAfter){const n=parseInt(pkgAfter[1]);if(n>=1&&n<=20)pkgs=n;}
      // Try before (*) - digit on its own line right before (*) 
      if(pkgs===1){
        const pkgBefore=item.match(/(\d+)\s*\n\s*[)(][*][)(]/);
        if(pkgBefore){const n=parseInt(pkgBefore[1]);if(n>=1&&n<=20)pkgs=n;}
      }

      // bon/goveena
      let bon='';
      if(/\u05d1\u05d5\u05df/i.test(item))bon='\u05d1\u05d5\u05df';
      else if(/\u05d2\u05d5\u05d1|\u05d9\u05d9\u05e0/i.test(item))bon='\u05d2\u05d5\u05d1\u05d9\u05d9\u05e0\u05d0';

      // Phone
      const phoneMatch=item.match(/0[5]\d{8}/);if(!phoneMatch)continue;
      const phone=phoneMatch[0];

      // Name
      let name='';
      const alIdx=item.indexOf('\u05d0\u05dc:');
      if(alIdx!==-1){
        const afterAl=item.slice(alIdx+3).trim();
        const pIdx=afterAl.indexOf(phone);
        if(pIdx>0)name=afterAl.slice(0,pIdx).trim().slice(0,40);
      }

      // Address: text after first phone occurrence, before end markers
      const firstPhoneIdx=item.indexOf(phone);
      let after=item.slice(firstPhoneIdx+phone.length);
      after=after.split(/[)][*][(]|\(\*\)|\u05d8\u05dc:\d|\u05d4\u05e2\u05e8\u05d5\u05ea\s+\u05de\u05e9\u05dc\u05d5\u05d7|SMS\s|\u05d7\u05d5\u05d1\u05d4\s|\u05d1\u05ea\u05d9\u05d0\u05d5\u05dd/)[0]
        .replace(/\n/g,' ').replace(/\s+/g,' ').trim();

      // Notes for weak address fallback
      const notesM=item.match(/\u05d4\u05e2\u05e8\u05d5\u05ea\s+\u05de\u05e9\u05dc\u05d5\u05d7[\s:]+([^\n\r(*]{3,40})/i);
      const notesAddr=notesM?notesM[1].trim():'';

      processStop(addrMap,after,type,pkgs,phone,name,bon,notesAddr);
    }
  }
  return [...addrMap.values()];
}

function processStop(addrMap,rawAddr,type,pkgs,phone,name,bon,notesAddr){
  let addr=cleanAddr(rawAddr);
  if(isWeakAddr(addr)){
    const cityHint=addr.trim().split(/\s+/)[0]||'';
    if(notesAddr){
      const na=extractAddrFromText(notesAddr);
      if(na&&na.length>3)addr=cityHint&&!na.includes(cityHint)?na+' '+cityHint:na;
    }
    if((isWeakAddr(addr)||!addr.includes(cityHint))&&phone){
      const ca=getAddressFromContacts(phone,cityHint);
      if(ca&&ca.length>3)addr=ca;
    }
  }
     // City-only = skip
    if(addr===addr.split(' ')[0])addr='';
    // Check if still has number=0 after contacts lookup (will be marked failed)
    const hasZeroNum=/\s0(\s|$)/.test(addr)&&/[\u0590-\u05FF]/.test(addr);
     // Validate address completeness: needs street + number>0 + city
    function isCompleteAddr(a){
      if(!a||a.length<5)return false;
      const words=a.trim().split(/\s+/);
      if(words.length<2)return false;
      // Must have at least one Hebrew word
      const hebrewWords=words.filter(w=>/[֐-׿]/.test(w));
      if(hebrewWords.length<1)return false;
      // Must have a number > 0
      const nums=a.match(/\d+/g);
      if(!nums||nums.every(n=>parseInt(n)===0))return false;
      return true;
    }
    // Mark as failed if address is incomplete after all attempts
    if(!isCompleteAddr(addr))addr=addr; // keep addr but will be marked failed below
    if(addr.length>3&&addr.length<70&&/[\u0590-\u05FF]/.test(addr)&&!addr.startsWith('\u05dc\u05dc\u05d0 \u05e8\u05d7\u05d5\u05d1')){
    const key=normKey(addr);
    if(addrMap.has(key)){
      const ex=addrMap.get(key);ex.packages+=pkgs;ex.deliveries++;if(bon&&!ex.bon)ex.bon=bon;
      if(name&&!ex.recipients.find(r=>r.phone===phone))ex.recipients.push({name,phone});
    }else{
      addrMap.set(key,{address:addr,type,packages:pkgs,deliveries:1,
        recipients:name?[{name,phone}]:[],name,phone,bon,
        addrFromContacts:false,lat:null,lon:null,failed:hasZeroNum||false,fromCache:false});
    }
  }
}

    headers:{'Content-Type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:3000,messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:mime,data:b64}},
      {type:'text',text:'SmartRun delivery report. Extract ALL rows. For each: type("\u05e4\u05d9\u05d6\u05d5\u05e8"/"\u05d0\u05d9\u05e1\u05d5\u05e3"), name, phone(05XXXXXXXX), address(street+number+city), pkg_out(int), pkg_in(int), bon(bool), goveena(bool). Return ONLY: {"stops":[...]}'}
    ]}]})
  });
  const d=await res.json();if(d.error)throw new Error(d.error.message);
  const txt=(d.content||[]).find(b=>b.type==='text')?.text||'{}';
  const parsed=JSON.parse(txt.replace(/[`]{3}json|[`]{3}/g,'').trim());
  return (parsed.stops||[]).map(s=>({
    address:cleanAddr(s.address||''),type:s.type==='\u05e4\u05d9\u05d6\u05d5\u05e8'?'delivery':'pickup',
    packages:(s.pkg_out||0)+(s.pkg_in||0)||1,deliveries:1,

    lat:null,lon:null,failed:false,fromCache:false
  })).filter(s=>s.address.length>3&&/[\u0590-\u05FF]/.test(s.address)&&/\d/.test(s.address));
}

async function geocodeAddr(rawAddr){
  let address=cleanAddr(rawAddr);
  const H={'User-Agent':'RouteBuilder/6.0'};
  const B='https://nominatim.openstreetmap.org/search';
  const tryN=async q=>{const r=await fetch(B+'?q='+encodeURIComponent(q)+'&format=json&limit=1',{headers:H});const d=await r.json();return d.length?d[0]:null};
  const tryP=async q=>{const r=await fetch('https://photon.komoot.io/api/?q='+encodeURIComponent(q)+'&limit=1&lang=en',{headers:H});const d=await r.json();return d.features?.length?{lat:d.features[0].geometry.coordinates[1],lon:d.features[0].geometry.coordinates[0]}:null};
  try{const d=await tryN(address+' \u05d9\u05e9\u05e8\u05d0\u05dc');if(d)return{lat:parseFloat(d.lat),lon:parseFloat(d.lon)}}catch{}
  let en=address;for(const[h,e]of Object.entries(CITY_EN))en=en.split(h).join(e);
  if(en!==address){try{const d=await tryN(en+' Israel');if(d)return{lat:parseFloat(d.lat),lon:parseFloat(d.lon)}}catch{}}
  try{const d=await tryP(address+' Israel');if(d)return{lat:d.lat,lon:d.lon}}catch{}
  const fw=address.split(' ')[0];
  const tog=fw.startsWith('\u05d4')?address.replace(fw,fw.slice(1)):address.replace(fw,'\u05d4'+fw);
  try{const d=await tryN(tog+' \u05d9\u05e9\u05e8\u05d0\u05dc');if(d)return{lat:parseFloat(d.lat),lon:parseFloat(d.lon)}}catch{}
  try{const d=await tryP(tog+' Israel');if(d)return{lat:d.lat,lon:d.lon}}catch{}
  const pfxMatch=address.match(/^(\u05d3\u05e8\u05da|\u05e9\u05d3'|\u05e9\u05d3\u05e8\u05d5\u05ea|\u05e8\u05d7'|\u05e8\u05d7\u05d5\u05d1)\s+(.+)/);
  if(pfxMatch){
    const wo=pfxMatch[2];
    try{const d=await tryN(wo+' \u05d9\u05e9\u05e8\u05d0\u05dc');if(d)return{lat:parseFloat(d.lat),lon:parseFloat(d.lon)}}catch{}
    try{const d=await tryP(wo+' Israel');if(d)return{lat:d.lat,lon:d.lon}}catch{}
  }
  const words=address.trim().split(/\s+/);const city=words[words.length-1];const enCity=CITY_EN[city]||city;
  try{const d=await tryN(enCity+' Israel');if(d)return{lat:parseFloat(d.lat),lon:parseFloat(d.lon),approximate:true,streetNote:address}}catch{}
  throw new Error('\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0');
}

    if(mode==='pdf'){
      if(!pdfText){setStatus('\u26a0 \u05d0\u05e0\u05d0 \u05d4\u05e2\u05dc\u05d4 \u05e7\u05d5\u05d1\u05e5 PDF',true);btn.disabled=false;releaseWakeLock();return;}
      setStatus('\u23f3 \u05de\u05d7\u05dc\u05e5 \u05e0\u05ea\u05d5\u05e0\u05d9\u05dd...');
      const fm=pdfText.match(/\u05e0\u05de\u05e2\u05e0\u05d9\u05dd:\s*(\d+)/);
      window._pdfTotal=fm?parseInt(fm[1]):0;
      // Extract PDF total packages from footer: look for standalone number after מסירה
      const _lines2=pdfText.split('\n');
      let _pdfPkg=0;
      for(let _i=0;_i<_lines2.length;_i++){
        const _s=_lines2[_i].trim();
        // Footer line: standalone number that appears near נמענים
        if(/^\d+$/.test(_s)&&parseInt(_s)>=50&&parseInt(_s)<=200){
          const _ctx=_lines2.slice(Math.max(0,_i-5),_i+5).map(l=>l.trim()).join(' ');
          if(_ctx.includes('\u05e0\u05de\u05e2\u05e0')||_ctx.includes('\u05de\u05e1\u05d9\u05e8')){
            _pdfPkg=parseInt(_s);break;
          }
        }
      }
      window._pdfPkgTotal=_pdfPkg;
      extracted=extractFromPDF(pdfText);
      if(!extracted.length)throw new Error('\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0\u05d5 \u05de\u05e9\u05dc\u05d5\u05d7\u05d9\u05dd');

    }else{
      if(!getKey()){setStatus('\u26a0 \u05d0\u05e0\u05d0 \u05d4\u05d6\u05df \u05de\u05e4\u05ea\u05d7 API',true);btn.disabled=false;releaseWakeLock();return;}
      if(!imgB64){setStatus('\u26a0 \u05d0\u05e0\u05d0 \u05d1\u05d7\u05e8 \u05ea\u05de\u05d5\u05e0\u05d4',true);btn.disabled=false;releaseWakeLock();return;}
      setStatus('\u23f3 \u05de\u05e0\u05ea\u05d7 \u05ea\u05de\u05d5\u05e0\u05d4...');
      extracted=await claudeExtract(imgB64,imgMime);
      if(!extracted.length)throw new Error('\u05dc\u05d0 \u05d6\u05d5\u05d4\u05d5 \u05de\u05e9\u05dc\u05d5\u05d7\u05d9\u05dd');
    }
    stops=extracted;
    let hits=0;
    for(let i=0;i<stops.length;i++){
      const s=stops[i];
      const cached=cacheGet(s.address);
      if(cached){s.lat=cached.lat;s.lon=cached.lon;s.fromCache=true;
        // Even cached addresses need completeness check
        if(!s.failed){const hw=s.address.match(/[א-ת]{2,}/g)||[];const nums=s.address.match(/\d+/g);
          if(hw.length<2||!nums||nums.every(n=>parseInt(n)===0))s.failed=true;}
        hits++;continue;}
      setStatus('\u23f3 \u05de\u05de\u05e4\u05d4 '+(i+1)+'/'+stops.length+(hits?' \u00b7 \u26a1'+hits+' \u05d6\u05d9\u05db\u05e8\u05d5\u05df':''));
      try{const g=await geocodeAddr(s.address);cacheSet(s.address,g.lat,g.lon);s.lat=g.lat;s.lon=g.lon;if(g.approximate){s.approximate=true;s.streetNote=g.streetNote||'';}
      }catch{s.failed=true;}
      await new Promise(r=>setTimeout(r,400));
    }
    clearStatus();renderResults();renderCache();
  }catch(e){setStatus('\u26a0 '+e.message,true);}
  finally{btn.disabled=false;releaseWakeLock();}
}

function xe(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function exportGPX(){
  const v=stops.filter(s=>!s.failed);if(!v.length)return;
  const wpts=v.map((s,i)=>'  <wpt lat="'+s.lat+'" lon="'+s.lon+'"><name>'+xe((i+1)+'. '+s.address)+'</name><desc>'+(s.type==='delivery'?'\u05e4\u05d9\u05d6\u05d5\u05e8':'\u05d0\u05d9\u05e1\u05d5\u05e3')+' \u00b7 '+s.packages+' \u05d7\u05d1\u05d9\u05dc\u05d5\u05ea'+(s.bon?' \u00b7 '+s.bon:'')+'</desc></wpt>').join('\n');
  const tpts=v.map(s=>'      <trkpt lat="'+s.lat+'" lon="'+s.lon+'"><name>'+xe(s.address)+'</name></trkpt>').join('\n');
  const gpx='<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="RouteBuilder" xmlns="http://www.topografix.com/GPX/1/1">\n'+wpts+'\n  <trk><name>\u05de\u05e1\u05dc\u05d5\u05dc</name><trkseg>\n'+tpts+'\n  </trkseg></trk>\n</gpx>';
  dl(gpx,'route.gpx','application/gpx+xml');
}

function exportCSV(){
  const v=stops.filter(s=>!s.failed&&s.lat&&s.lon);
  if(!v.length)return;
  const hdr='Name,Latitude,Longitude,Address,Notes';
  const rows=v.map((s,i)=>{
    const nm='"'+(i+1)+'. '+s.address.replace(/"/g,'""')+'"';
    const note='"'+(s.type==='delivery'?'\u05e4\u05d9\u05d6\u05d5\u05e8':'\u05d0\u05d9\u05e1\u05d5\u05e3')+' '+s.packages+(s.bon?' '+s.bon:'')+'"';
    const addr='"'+s.address.replace(/"/g,'""')+'"';
    return [nm,s.lat.toFixed(6),s.lon.toFixed(6),addr,note].join(',');
  });
  dl('\uFEFF'+hdr+'\n'+rows.join('\n'),'route.csv','text/csv;charset=utf-8');
}

function exportVCF(){
  const allRecips=[];
  for(const s of stops){
    const recips=s.recipients&&s.recipients.length?s.recipients:[{name:s.name,phone:s.phone}];
    for(const r of recips){if(r.name&&r.name.length>1)allRecips.push({...r,address:s.address});}
  }
  const newC=allRecips.filter(r=>isNewContact(r.phone));
  if(!newC.length){alert(allRecips.length?'\u05db\u05dc \u05d0\u05e0\u05e9\u05d9 \u05d4\u05e7\u05e9\u05e8 \u05db\u05d1\u05e8 \u05e7\u05d9\u05d9\u05de\u05d9\u05dd!':'\u05d0\u05d9\u05df \u05d0\u05e0\u05e9\u05d9 \u05e7\u05e9\u05e8');return;}
  const vcf=newC.map(r=>'BEGIN:VCARD\nVERSION:3.0\nFN:'+r.name+' - '+r.address+'\nN:'+r.name+';;'+r.address+';;\nTEL;TYPE=CELL:'+r.phone+'\nADR:;;'+r.address+';;;;\nNOTE:'+r.address+'\nEND:VCARD').join('\n');
  dl(vcf,'contacts_new.vcf','text/vcard');
  const sk=allRecips.length-newC.length;
  if(sk>0)setTimeout(()=>alert(newC.length+' \u05d7\u05d3\u05e9\u05d9\u05dd \u05d9\u05d5\u05e6\u05d0\u05d5\n'+sk+' \u05d3\u05d5\u05dc\u05d2\u05d5 (\u05db\u05d1\u05e8 \u05e7\u05d9\u05d9\u05de\u05d9\u05dd)'),300);
}

function dl(content,filename,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=filename;a.click();}

function renderResults(){
  const el=document.getElementById('results');
  const valid=stops.filter(s=>!s.failed).length;
  const failed=stops.filter(s=>s.failed).length;
  const cached=stops.filter(s=>s.fromCache).length;
  const deliveries=stops.filter(s=>s.type==='delivery').length;
  const pickups=stops.filter(s=>s.type==='pickup').length;
  const totalPkgs=stops.reduce((a,s)=>a+s.packages,0);
  const pdfTotal=window._pdfTotal||0;
  const pdfPkgTotal=window._pdfPkgTotal||0;
  const pkgDiff=(pdfPkgTotal>0&&totalPkgs<pdfPkgTotal)?pdfPkgTotal-totalPkgs:0;
  let html='<hr class="divider"><div class="res-head"><div style="display:flex;width:100%;justify-content:space-between;align-items:center"><span style="font-size:13px;color:#ffa000;font-weight:700">'+stops.length+' \u05e2\u05e6\u05d9\u05e8\u05d5\u05ea'+(pdfTotal?' <span style="font-size:10px;color:#555">\u05de\u05ea\u05d5\u05da '+pdfTotal+' \u05d1PDF</span>':'')+'</span><button class="reset-btn" onclick="resetAll()">\u21ba</button></div><span style="font-size:11px;color:#888">\u2728\ufe0f '+deliveries+' \u05e4\u05d9\u05d6\u05d5\u05e8 \u00b7 \ud83d\udd04 '+pickups+' \u05d0\u05d9\u05e1\u05d5\u05e3 \u00b7 '+totalPkgs+(pdfPkgTotal?' /'+pdfPkgTotal:'')+(pkgDiff?' \u00b7 <span style="color:#e74c3c">\u26a0 \u05d7\u05e1\u05e8 '+pkgDiff+'</span>':'')+' \u05d7\u05d1\u05d9\u05dc\u05d5\u05ea \u05e1\u05d4"\u05db'+(cached?' \u00b7 <span style="color:#27ae60">\u26a1'+cached+' \u05d6\u05d9\u05db\u05e8\u05d5\u05df</span>':'')+(failed?' \u00b7 <span style="color:#e67e22">'+failed+' \u05e0\u05db\u05e9\u05dc\u05d5</span>':'')+'</span></div><div class="list">';
  stops.forEach((s,i)=>{
    const cls=s.failed?'failed':s.approximate?'approx':s.type;
    const numCls=s.type==='delivery'?'d':'p';
    const geo=s.failed?'<span style="font-size:9px;color:#e74c3c">\u26a0 \u05dc\u05d0 \u05e0\u05de\u05e6\u05d0</span>':s.approximate?'<span style="font-size:9px;color:#9b59b6">~ \u05de\u05e8\u05db\u05d6 \u05e2\u05d9\u05e8</span>':s.fromCache?'<span style="font-size:9px;color:#27ae60">\u26a1</span>':'<span style="font-size:9px;color:#ffa000">\u2713</span>';
    const typeLabel=s.type==='delivery'?'<span style="color:#ffa000">\ud83d\udce6 \u05e4\u05d9\u05d6\u05d5\u05e8</span>':'<span style="color:#27ae60">\ud83d\udd04 \u05d0\u05d9\u05e1\u05d5\u05e3</span>';
    const recips=s.recipients&&s.recipients.length?s.recipients:[{name:s.name,phone:s.phone}];
    const recipHtml=recips.filter(r=>r.name).map(r=>'<br>\ud83d\udc64 '+esc(r.name)+(r.phone?' \u00b7 \ud83d\udcde '+esc(r.phone):'')).join('');
    html+='<div class="card '+cls+'"><div class="card-top"><div class="num '+numCls+'">'+(i+1)+'</div><div class="card-info" id="inf-'+i+'"><div class="card-addr">'+geo+' '+esc(s.address)+'</div><div class="card-meta">'+typeLabel+' \u00b7 <span style="color:#ffa000;font-weight:700">'+s.packages+' \u05d7\u05d1\u05d9\u05dc\u05d5\u05ea</span>'+(s.bon?' \u00b7 <span style="color:#9b59b6">'+s.bon+'</span>':'')+recipHtml+'</div></div><div class="acts"><button class="act" style="border:1px solid #888;color:#888" onclick="startEdit('+i+')">\u270e</button><button class="act" style="border:1px solid #27ae60;color:#27ae60" onclick="pickOnMap('+i+')">&#128205;</button><button class="act" style="border:1px solid #888;color:#888" onclick="moveUp('+i+')" '+(i===0?'disabled':'')+'>\u2191</button><button class="act" style="border:1px solid #888;color:#888" onclick="moveDown('+i+')" '+(i===stops.length-1?'disabled':'')+'>\u2193</button><button class="act" style="border:1px solid #c0392b;color:#c0392b" onclick="del('+i+')">\u2715</button></div></div></div>';
  });
  const hasC=stops.some(s=>(s.recipients&&s.recipients.length)||(s.name&&s.name.length>1));
  html+='</div><div class="export-row"><button class="gpx-btn" onclick="exportGPX()" '+(valid===0?'disabled':'')+'>&#11015; GPX &#8594; Spoke</button><button class="vcf-btn" onclick="exportVCF()" '+(!hasC?'disabled':'')+'>&#128100; VCF</button></div><p class="hint">GPX: Spoke Circuit &#8592; Import &nbsp;\u00b7&nbsp; VCF: \u05e4\u05ea\u05d7 \u05dc\u05d9\u05d9\u05d1\u05d5\u05d0 \u05d0\u05e0\u05e9\u05d9 \u05e7\u05e9\u05e8</p>';
  el.innerHTML=html;el.style.display='';
}

function pickOnMap(i){
  const s=stops[i];
  const lat=s.lat||31.5;const lon=s.lon||34.9;
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;background:#0d0f14';
  modal.innerHTML=
    '<div style="padding:12px 14px;background:#111;color:#ffa000;font-family:monospace;font-size:13px;display:flex;justify-content:space-between;align-items:center">'+
    '<span>&#128205; '+s.address+'</span>'+
    '<button onclick="this.closest(\'.map-modal\').remove()" style="background:transparent;border:1px solid #555;color:#888;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:monospace">\u05d1\u05d9\u05d8\u05d5\u05dc</button>'+
    '</div>'+
    '<div id="map-frame" style="flex:1"></div>'+
    '<div style="padding:10px 14px;background:#111;display:flex;gap:8px;align-items:center">'+
    '<span style="font-size:11px;color:#888;flex:1">\u05d2\u05e8\u05d5\u05e8 \u05d0\u05ea \u05d4\u05e1\u05d9\u05db\u05d4 \u05dc\u05de\u05d9\u05e7\u05d5\u05dd \u05d4\u05de\u05d3\u05d5\u05d9\u05e7</span>'+
    '<button id="map-save-btn" style="padding:10px 20px;background:#ffa000;color:#0d0f14;border:none;border-radius:4px;cursor:pointer;font-family:monospace;font-weight:700">\u2713 \u05e9\u05de\u05d5\u05e8</button>'+
    '</div>';
  modal.className='map-modal';
  document.body.appendChild(modal);

  // Load Leaflet CSS
  if(!document.getElementById('leaflet-css')){
    const lc=document.createElement('link');
    lc.id='leaflet-css';lc.rel='stylesheet';
    lc.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(lc);
  }

  // Load Leaflet JS and init map
  function initMap(){
    const mapDiv=document.getElementById('map-frame');
    const map=L.map(mapDiv).setView([lat,lon],16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'&copy; OpenStreetMap',maxZoom:19
    }).addTo(map);
    const marker=L.marker([lat,lon],{draggable:true}).addTo(map);
    marker.bindPopup(s.address).openPopup();
    let curLat=lat,curLon=lon;
    marker.on('dragend',function(e){
      curLat=e.target.getLatLng().lat;
      curLon=e.target.getLatLng().lng;
    });
    map.on('click',function(e){
      marker.setLatLng(e.latlng);
      curLat=e.latlng.lat;curLon=e.latlng.lng;
    });
    document.getElementById('map-save-btn').onclick=function(){
      stops[i].lat=curLat;stops[i].lon=curLon;
      stops[i].failed=false;stops[i].approximate=false;
      cacheSet(stops[i].address,curLat,curLon);
      modal.remove();renderResults();
    };
  }

  if(typeof L !== 'undefined'){initMap();}
  else{
    const ls=document.createElement('script');
    ls.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    ls.onload=initMap;
    document.head.appendChild(ls);
  }
}


function startEdit(i){
  document.getElementById('inf-'+i).innerHTML='<input style="width:100%;background:#1a1e26;border:1px solid #ffa000;color:#e8e2d4;font-family:inherit;font-size:12px;padding:5px 8px;border-radius:4px;outline:none;margin-bottom:4px" id="ei-'+i+'" value="'+esc(stops[i].address)+'"><div style="display:flex;gap:6px;margin-top:4px"><button class="act" style="width:auto;padding:0 12px;height:26px;border:1px solid #27ae60;color:#27ae60" onclick="saveEdit('+i+')">\u2713 \u05e9\u05de\u05d5\u05e8</button><button class="act" style="width:auto;padding:0 12px;height:26px;border:1px solid #888;color:#888" onclick="renderResults()">\u05d1\u05d9\u05d8\u05d5\u05dc</button></div>';
}
async function saveEdit(i){
  const val=(document.getElementById('ei-'+i)?.value||'').trim();if(!val)return;
  stops[i].address=val;stops[i].failed=false;stops[i].fromCache=false;stops[i].approximate=false;
  const cached=cacheGet(val);
  if(cached){stops[i].lat=cached.lat;stops[i].lon=cached.lon;stops[i].fromCache=true;renderResults();return;}
  setStatus('\u23f3 \u05de\u05de\u05e4\u05d4...');
  try{const g=await geocodeAddr(val);cacheSet(val,g.lat,g.lon);stops[i].lat=g.lat;stops[i].lon=g.lon;if(g.approximate)stops[i].approximate=true;}
  catch{stops[i].failed=true;}
  clearStatus();renderResults();
}
function moveUp(i){if(i>0){[stops[i-1],stops[i]]=[stops[i],stops[i-1]];renderResults();}}
function moveDown(i){if(i<stops.length-1){[stops[i],stops[i+1]]=[stops[i+1],stops[i]];renderResults();}}
function del(i){stops.splice(i,1);renderResults();}

function importGPX(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=function(e){
    const xml=e.target.result;
    const parser=new DOMParser();
    const doc=parser.parseFromString(xml,'application/xml');
    const wpts=Array.from(doc.querySelectorAll('wpt'));
    let count=0;
    for(const wpt of wpts){
      const lat=parseFloat(wpt.getAttribute('lat'));
      const lon=parseFloat(wpt.getAttribute('lon'));
      const nameEl=wpt.querySelector('name');
      if(!nameEl||isNaN(lat)||isNaN(lon))continue;
      let name=nameEl.textContent||'';
      name=name.replace(/^[0-9]+[.] */,'').replace(/ *[[[][^\]]*[\]] *$/,'').trim();
      if(name.length>3){
        cacheSet(name,lat,lon);
        count++;
      }
    }
    alert(count+' \u05db\u05ea\u05d5\u05d1\u05d5\u05ea \u05e0\u05e9\u05de\u05e8\u05d5 \u05dc\u05d6\u05d9\u05db\u05e8\u05d5\u05df \u05de\u05d4-GPX');
    renderCache();
  };
  r.readAsText(file,'utf-8');
}


function renderCache(){
  const el=document.getElementById('cache-sec');
  const cache=loadCache();const keys=Object.keys(cache);
  if(!keys.length){el.style.display='none';return;}
  el.innerHTML='<div class="cache-panel"><div style="margin-bottom:8px"><button onclick="document.getElementById(\'f-gpx-in\').click()" style="width:100%;padding:8px;background:transparent;border:1px solid #27ae6066;color:#27ae60;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px">&#128229; \u05d9\u05d9\u05d1\u05d0 GPX \u05e7\u05d9\u05d9\u05dd</button></div><div class="cache-title"<div class="cache-title">\u26a1 \u05d6\u05d9\u05db\u05e8\u05d5\u05df ('+keys.length+')</div><div class="cache-list">'+keys.map(k=>'<div class="cache-item"><span>'+esc(k)+'</span><button class="cache-del" onclick="cacheDel(\''+esc(k).replace(/'/g,"\\'")+"');renderCache()\">\u2715</button></div>").join('')+'</div><button onclick="if(confirm(\'\u05dc\u05de\u05d7\u05d5\u05e7?\')){ localStorage.removeItem(\''+CK+'\');renderCache();}" style="margin-top:8px;width:100%;padding:6px;background:transparent;border:1px solid #c0392b44;color:#c0392b88;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px">\ud83d\uddd1 \u05e0\u05e7\u05d4</button></div>';
  el.style.display='';
}
function setStatus(msg,err=false){const el=document.getElementById('status');el.className='status'+(err?' err':'');el.innerHTML=msg;el.style.display='';}
function clearStatus(){document.getElementById('status').style.display='none';}
function clearResults(){stops=[];document.getElementById('results').style.display='none';clearStatus();}
function resetAll(){clearResults();if(mode==='pdf')clearPDF();else changeImg();}
</script>
